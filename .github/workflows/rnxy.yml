name: Render Rain

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix:   ${{ steps.discover.outputs.matrix }}
      has_work: ${{ steps.discover.outputs.has_work }}

    steps:
      - name: Install gdown
        run: pip install gdown --break-system-packages

      - name: Discover scene files
        id: discover
        run: |
          python3 - << 'PYEOF'
          import json, os, sys, time
          from pathlib import Path
          import gdown

          SCENE_FOLDER = "1ZZw4iNgd8VOoIpko_qSQZK5nakH2_FEu"
          TMP_DIR = Path("/tmp/discover_rain")
          TMP_DIR.mkdir(parents=True, exist_ok=True)

          print("Discovering scene files...")

          for attempt in range(1, 4):
              try:
                  gdown.download_folder(
                      id=SCENE_FOLDER,
                      output=str(TMP_DIR),
                      quiet=False,
                  )
                  break
              except Exception as e:
                  print(f"Attempt {attempt}/3 failed: {e}")
                  if attempt == 3:
                      sys.exit(1)
                  time.sleep(30 * attempt)

          VALID_EXT = {'.mp4', '.mov', '.webm', '.jpg', '.jpeg', '.png', '.webp'}
          files = sorted(
              p for p in TMP_DIR.rglob("*")
              if p.suffix.lower() in VALID_EXT and p.is_file()
          )

          if not files:
              print("ERROR: No scene files found.", file=sys.stderr)
              sys.exit(1)

          print(f"\nFound {len(files)} scene file(s):")
          for f in files:
              print(f"  {f.name}")

          matrix = {"include": [{"scene_name": f.name} for f in files]}

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"matrix={json.dumps(matrix)}\n")
              fh.write("has_work=true\n")

          print("Matrix written.")
          PYEOF

  render:
    needs: discover
    if: needs.discover.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 340

    strategy:
      max-parallel: 1
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "=== Disk before ==="
          df -h
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" \
            /usr/local/share/powershell \
            /usr/share/swift \
            || true
          sudo apt-get clean -qq
          docker system prune -af --volumes || true
          echo "=== Disk after ==="
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --fix-missing ffmpeg fonts-dejavu
          pip install gdown --break-system-packages
          echo "ffmpeg: $(ffmpeg -version 2>&1 | head -1)"

      - name: Render
        id: render
        env:
          TARGET_SCENE_NAME: ${{ matrix.scene_name }}
        run: python3 rain.py

      - name: Create release tag
        id: tag
        run: |
          TS=$(date -u +"%Y%m%d-%H%M%S")
          SAFE=$(echo "${{ matrix.scene_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          TAG="rain-${TS}-${SAFE}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "${{ matrix.scene_name }} — ${{ steps.render.outputs.final_size_mb }} MB"
          body: |
            ## Rendered Video

            | Field | Value |
            |---|---|
            | **Scene file** | `${{ matrix.scene_name }}` |
            | **Final size** | ${{ steps.render.outputs.final_size_mb }} MB |
            | **Duration** | ${{ steps.render.outputs.duration_seconds }}s |
            | **Stop reason** | ${{ steps.render.outputs.stop_reason }} |
            | **Run** | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            > Download the file under **Assets** below.
          files: ${{ steps.render.outputs.output_path }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
