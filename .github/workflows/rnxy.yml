name: Render Rain
on:
  workflow_dispatch:
jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix:
        image_index: [0, 1]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg --fix-missing
          pip install gdown --break-system-packages
      - name: Run render
        env:
          IMAGE_INDEX: ${{ matrix.image_index }}
        run: python tenko.py
      - name: Show image used in summary
        if: always()
        run: |
          INDEX=${{ matrix.image_index }}
          NAME_FILE="/tmp/rain/image_name_${INDEX}.txt"
          ID_FILE="/tmp/rain/image_id_${INDEX}.txt"
          FOLDER_ID="1ZZw4iNgd8VOoIpko_qSQZK5nakH2_FEu"
          if [ -f "$NAME_FILE" ]; then
            IMG_NAME=$(cat "$NAME_FILE")
            echo "## 🖼️ Job ${INDEX} — Image Used" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "
